services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/wineai-backend:latest
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - ./assortments:/app/assortments:ro
    ports:
      - "5000:5000"

  frontend:
    image: ghcr.io/${GHCR_OWNER}/wineai-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
